<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dasato — Interaktívna Príručka</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --bg2:#f7f7f5; --bg3:#f0f0ec; --bg4:#e8e8e3;
  --ink:#111111; --ink2:#444444; --ink3:#888888; --ink4:#bbbbbb;
  --yellow:#f5c400; --yellow2:#ffd740;
  --yellow-a:rgba(245,196,0,0.12); --yellow-b:rgba(245,196,0,0.06);
  --pink:#e8175d; --pink2:#ff3d7a;
  --pink-a:rgba(232,23,93,0.10); --pink-b:rgba(232,23,93,0.06);
  --border:#e5e5e0; --border2:#d0d0c8;
  --green:#16a34a; --green-a:rgba(22,163,74,0.10);
  --red:#dc2626; --red-a:rgba(220,38,38,0.08);
  --blue:#2563eb; --blue-a:rgba(37,99,235,0.08);
  --r:10px; --r2:6px;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.06),0 2px 12px rgba(0,0,0,0.04);
  --shadow:0 4px 24px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.12);
  --topbar-h:64px;
}
html,body { min-height:100%; background:var(--bg); color:var(--ink); font-family:'Barlow',sans-serif; font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased; }
#root { display:flex; flex-direction:column; min-height:100vh; }
.app { display:flex; flex-direction:column; min-height:100vh; }
.body { display:flex; flex:1; }
.topbar { height:var(--topbar-h); background:var(--bg); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:200; box-shadow:var(--shadow-sm); }
.topbar-logo { display:flex; align-items:center; gap:9px; flex-shrink:0; cursor:pointer; }
.logo-gem { width:22px; height:22px; background:var(--yellow); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); flex-shrink:0; }
.logo-wordmark { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:var(--ink); }
.topbar-divider { width:1px; height:28px; background:var(--border); flex-shrink:0; }
.topbar-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink3); flex-shrink:0; }
.timeline-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.timeline { display:flex; align-items:center; }
.tl-step { display:flex; align-items:center; cursor:pointer; }
.tl-node { display:flex; flex-direction:column; align-items:center; gap:4px; padding:0 4px; transition:all 0.15s; }
.tl-circle { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800; border:2px solid var(--border2); background:var(--bg); color:var(--ink3); transition:all 0.2s; flex-shrink:0; }
.tl-circle.done { background:var(--yellow); border-color:var(--yellow); color:var(--ink); }
.tl-circle.active { background:var(--ink); border-color:var(--ink); color:var(--yellow); box-shadow:0 0 0 3px var(--yellow-a); }
.tl-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink4); white-space:nowrap; transition:color 0.15s; }
.tl-label.done { color:var(--ink2); }
.tl-label.active { color:var(--ink); font-weight:700; }
.tl-step:hover .tl-circle:not(.active) { border-color:var(--pink); color:var(--pink); }
.tl-step:hover .tl-label { color:var(--pink); }
.tl-line { width:40px; height:2px; background:var(--border); flex-shrink:0; position:relative; overflow:hidden; }
.tl-line-fill { position:absolute; left:0; top:0; height:100%; background:var(--yellow); transition:width 0.35s; }
.nav-arrows { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.arrow-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--border2); background:var(--bg); color:var(--ink2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; font-size:15px; line-height:1; }
.arrow-btn:hover:not(:disabled) { border-color:var(--pink); color:var(--pink); background:var(--pink-b); }
.arrow-btn:disabled { opacity:0.3; cursor:not-allowed; }
.sidebar { width:230px; background:var(--bg2); border-right:1px solid var(--border); padding:28px 0; flex-shrink:0; position:sticky; top:var(--topbar-h); height:calc(100vh - var(--topbar-h)); overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; font-size:13px; font-weight:500; color:var(--ink3); cursor:pointer; transition:all 0.12s; border-left:3px solid transparent; }
.nav-item:hover { background:var(--bg3); color:var(--ink); }
.nav-item.active { background:var(--yellow-b); color:var(--ink); font-weight:700; border-left-color:var(--yellow); }
.pip { width:6px; height:6px; border-radius:50%; background:var(--border2); flex-shrink:0; }
.pip.done { background:var(--green); }
.pip.yellow { background:var(--yellow); }
.sidebar-footer { margin-top:32px; padding:20px; border-top:1px solid var(--border); }
.sidebar-quote { font-size:11px; font-style:italic; color:var(--ink4); line-height:1.6; }
.main { flex:1; overflow-y:auto; background:var(--bg); }
.page { max-width:820px; margin:0 auto; padding:48px 44px 80px; }
.eyebrow { display:inline-flex; align-items:center; gap:7px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:var(--pink); margin-bottom:12px; }
.eyebrow::before { content:''; display:block; width:7px; height:7px; background:var(--pink); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); }
.page-title { font-family:'Barlow Condensed',sans-serif; font-size:52px; font-weight:900; line-height:1; text-transform:uppercase; letter-spacing:-0.5px; color:var(--ink); margin-bottom:12px; }
.page-title em { color:var(--pink); font-style:normal; }
.page-desc { font-size:14px; color:var(--ink3); max-width:520px; line-height:1.75; margin-bottom:36px; }
.card { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:26px 28px; margin-bottom:18px; box-shadow:var(--shadow-sm); }
.card-eyebrow { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:var(--pink); margin-bottom:6px; }
.card-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; text-transform:uppercase; color:var(--ink); margin-bottom:4px; }
.card-desc { font-size:13px; color:var(--ink3); margin-bottom:20px; line-height:1.6; }
.textarea { width:100%; background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--r2); padding:13px 15px; color:var(--ink); font-family:'Barlow',sans-serif; font-size:14px; line-height:1.7; resize:vertical; min-height:120px; outline:none; transition:border-color 0.15s; }
.textarea:focus { border-color:var(--pink); background:var(--bg); }
.textarea::placeholder { color:var(--ink4); }
.textarea.error { border-color:var(--red); }
.input { width:100%; background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--r2); padding:10px 14px; color:var(--ink); font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color 0.15s; }
.input:focus { border-color:var(--pink); background:var(--bg); }
.input::placeholder { color:var(--ink4); }
.char-count { font-size:11px; color:var(--ink4); text-align:right; margin-top:5px; }
.btn { display:inline-flex; align-items:center; gap:7px; padding:10px 22px; border-radius:var(--r2); font-family:'Barlow',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.12s; border:none; text-transform:uppercase; letter-spacing:1.5px; }
.btn-yellow { background:var(--yellow); color:var(--ink); }
.btn-yellow:hover { background:var(--yellow2); box-shadow:0 4px 16px rgba(245,196,0,0.35); transform:translateY(-1px); }
.btn-pink { background:var(--pink); color:#fff; }
.btn-pink:hover { background:var(--pink2); box-shadow:0 4px 16px rgba(232,23,93,0.3); transform:translateY(-1px); }
.btn-outline { background:transparent; color:var(--ink2); border:1.5px solid var(--border2); }
.btn-outline:hover { border-color:var(--pink); color:var(--pink); }
.btn-stuck { background:var(--pink-b); color:var(--pink); border:1.5px solid rgba(232,23,93,0.2); font-size:11px; padding:8px 16px; }
.btn-stuck:hover { background:var(--pink-a); }
.ai-box { background:var(--bg2); border:1.5px solid var(--border); border-left:3px solid var(--yellow); border-radius:var(--r2); padding:13px 17px; margin-top:14px; }
.ai-box.pink { border-left-color:var(--pink); }
.ai-box.green { border-left-color:var(--green); }
.ai-box.red { border-left-color:var(--red); }
.ai-tag { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--yellow); margin-bottom:5px; }
.ai-tag.pink { color:var(--pink); }
.ai-tag.green { color:var(--green); }
.ai-tag.red { color:var(--red); }
.ai-text { font-size:13px; color:var(--ink2); line-height:1.7; }
.quote-box { background:linear-gradient(135deg,var(--yellow-b),var(--pink-b)); border:1.5px solid var(--border); border-radius:var(--r); padding:18px 22px; margin-top:14px; }
.quote-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:var(--pink); margin-bottom:7px; }
.quote-text { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; text-transform:uppercase; color:var(--ink); line-height:1.3; }
.quote-text em { color:var(--pink); font-style:normal; }
.prog-wrap { margin-bottom:20px; }
.prog-top { display:flex; justify-content:space-between; margin-bottom:7px; }
.prog-lbl { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink3); }
.prog-val { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; color:var(--pink); }
.prog-bar { height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:var(--yellow); border-radius:2px; transition:width 0.35s; }
.check-row { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.check-row:last-child { border-bottom:none; }
.check-box { width:18px; height:18px; border-radius:4px; border:2px solid var(--border2); background:transparent; cursor:pointer; flex-shrink:0; margin-top:2px; appearance:none; transition:all 0.12s; position:relative; }
.check-box:checked { background:var(--yellow); border-color:var(--yellow); }
.check-box:checked::after { content:''; position:absolute; left:3px; top:0px; width:5px; height:9px; border:2px solid var(--ink); border-top:none; border-left:none; transform:rotate(45deg); }
.check-label { font-size:13px; color:var(--ink2); line-height:1.55; }
.check-label.done { color:var(--ink4); text-decoration:line-through; }
.drag-item { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--r2); margin-bottom:7px; cursor:grab; transition:border-color 0.12s; }
.drag-item:hover { box-shadow:var(--shadow-sm); }
.drag-item.dragover { border-color:var(--pink); background:var(--pink-b); }
.drag-item.dragging { opacity:0.3; }
.drag-handle { color:var(--ink4); font-size:13px; user-select:none; }
.drag-text { flex:1; font-size:13px; color:var(--ink); }
.level-badge { font-size:9px; text-transform:uppercase; letter-spacing:1px; font-weight:700; padding:3px 9px; border-radius:999px; flex-shrink:0; }
.lv-green { background:var(--green-a); color:var(--green); border:1px solid rgba(22,163,74,0.2); }
.lv-blue { background:var(--blue-a); color:var(--blue); border:1px solid rgba(37,99,235,0.2); }
.lv-red { background:var(--red-a); color:var(--red); border:1px solid rgba(220,38,38,0.2); }
.mentor-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
.mentor-card { background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--r2); padding:16px 18px; }
.mentor-name { font-size:12px; font-weight:700; color:var(--ink); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
.call-dots { display:flex; gap:7px; }
.call-dot { width:26px; height:26px; border-radius:50%; border:2px solid var(--border2); background:var(--bg); cursor:pointer; transition:all 0.12s; }
.call-dot.done { background:var(--yellow); border-color:var(--yellow); }
.call-dot:hover:not(.done) { border-color:var(--pink); }
.sol-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.sol-num { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; color:var(--ink4); min-width:22px; }
.slider-wrap { display:flex; align-items:center; gap:8px; }
.slider-val { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; color:var(--pink); min-width:20px; text-align:center; }
input[type=range] { -webkit-appearance:none; appearance:none; height:4px; background:var(--bg3); border-radius:2px; outline:none; width:88px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--pink); cursor:pointer; }
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:13px; margin-bottom:30px; }
.stat-tile { background:var(--bg); border:1.5px solid var(--border); border-radius:var(--r); padding:20px 22px; box-shadow:var(--shadow-sm); }
.stat-num { font-family:'Barlow Condensed',sans-serif; font-size:44px; font-weight:900; line-height:1; margin-bottom:4px; }
.stat-num.yellow { color:var(--yellow); }
.stat-num.pink { color:var(--pink); }
.stat-lbl { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--ink3); font-weight:700; }
.mod-row { display:flex; align-items:center; gap:18px; padding:18px 22px; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--r); margin-bottom:11px; cursor:pointer; transition:all 0.15s; box-shadow:var(--shadow-sm); }
.mod-row:hover { border-color:var(--pink); box-shadow:0 4px 20px rgba(232,23,93,0.08); }
.mod-num { font-family:'Barlow Condensed',sans-serif; font-size:40px; font-weight:900; color:var(--ink4); line-height:1; min-width:44px; }
.mod-info { flex:1; }
.mod-title { font-size:14px; font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:0.5px; }
.mod-sub { font-size:12px; color:var(--ink3); margin-top:3px; }
.sbadge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; padding:4px 12px; border-radius:999px; }
.sb-todo { background:var(--bg3); color:var(--ink3); border:1px solid var(--border); }
.sb-active { background:var(--yellow-a); color:var(--ink); border:1px solid rgba(245,196,0,0.3); }
.sb-done { background:var(--green-a); color:var(--green); border:1px solid rgba(22,163,74,0.2); }
.top3-card { background:var(--bg); border:1.5px solid var(--border); border-radius:var(--r); padding:22px 24px; margin-bottom:14px; box-shadow:var(--shadow-sm); }
.top3-tag { font-size:9px; text-transform:uppercase; letter-spacing:2px; font-weight:700; color:var(--pink); margin-bottom:10px; }
.analytic-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
.analytic-label { display:block; font-size:9px; text-transform:uppercase; letter-spacing:2px; font-weight:700; color:var(--ink3); margin-bottom:5px; }
.sel-row { display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.sel-row:last-child { border-bottom:none; }
.sel-row:hover .sel-text { color:var(--pink); }
.sel-text { flex:1; font-size:13px; color:var(--ink2); transition:color 0.12s; }
.sel-check { width:16px; height:16px; border-radius:4px; border:2px solid var(--border2); background:transparent; cursor:pointer; appearance:none; flex-shrink:0; transition:all 0.12s; }
.sel-check:checked { background:var(--pink); border-color:var(--pink); }
.score-pips { display:flex; gap:3px; }
.pip-dot { width:7px; height:7px; border-radius:2px; }
.export-box { background:var(--ink); color:#fff; border-radius:var(--r); padding:40px; text-align:center; position:relative; overflow:hidden; }
.export-box::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--yellow),var(--pink)); }
.export-title { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900; text-transform:uppercase; color:#fff; margin-bottom:8px; }
.export-sub { font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:26px; }
.fb-counter { display:flex; align-items:baseline; gap:12px; margin-bottom:20px; }
.fb-num { font-family:'Barlow Condensed',sans-serif; font-size:56px; font-weight:900; color:var(--pink); line-height:1; }
.fb-lbl { font-size:13px; color:var(--ink3); }
.toast { position:fixed; bottom:24px; right:24px; width:300px; z-index:300; animation:slideUp 0.22s ease; }
.toast-inner { background:var(--bg); border:1.5px solid var(--border); border-top:3px solid var(--pink); border-radius:var(--r); padding:15px 17px; box-shadow:var(--shadow-lg); position:relative; }
.toast-close { position:absolute; top:11px; right:13px; background:none; border:none; color:var(--ink3); cursor:pointer; font-size:15px; line-height:1; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.row-flex { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.row-right { display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }
.divider { border:none; border-top:1px solid var(--border); margin:28px 0; }
@media(max-width:760px){
  .sidebar{display:none;}
  .page{padding:28px 18px 60px;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .mentor-grid{grid-template-columns:1fr;}
  .analytic-grid{grid-template-columns:1fr;}
  .page-title{font-size:38px;}
  .tl-label{display:none;}
}
</style>
</head>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const STEPS = [

];

const initKnowledge = [

/* ── TOPBAR ── */
function Topbar({ active, onNav, status }) {
  const keys = ["m0","m1","m2","m3"];
  const idx  = keys.indexOf(active);
  const isDash = active === "dashboard";
  const goBack = () => { if(isDash) return; onNav(idx<=0?"dashboard":keys[idx-1]); };
  const goFwd  = () => { if(isDash){onNav("m0");return;} if(idx<keys.length-1) onNav(keys[idx+1]); };
  return (
    <header className="topbar">
      <div className="topbar-logo" onClick={()=>onNav("dashboard")}>
        <div className="logo-gem"/>
        <span className="logo-wordmark">Dasato</span>
      </div>
      <div className="topbar-divider"/>
      <span className="topbar-label">Príručka</span>
      <div className="timeline-wrap">
        <div className="timeline">
          {STEPS.map((step,i) => {
            const st = status[step.key]||"todo";
            const isActive = active===step.key;
            const isDone   = st==="done";
            return (
              <div key={step.key} className="tl-step" onClick={()=>onNav(step.key)}>
                <div className="tl-node">
                  <div className={`tl-circle${isActive?" active":isDone?" done":""}`}>
                    {isDone&&!isActive?"✓":i+1}
                  </div>
                  <div className={`tl-label${isActive?" active":isDone?" done":""}`}>{step.short}</div>
                </div>
                {i<STEPS.length-1 && (
                  <div className="tl-line">
                    <div className="tl-line-fill" style={{width:isDone?"100%":"0%"}}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
      <div className="nav-arrows">
        <button className="arrow-btn" onClick={goBack} disabled={isDash} title="Späť">←</button>
        <button className="arrow-btn" onClick={goFwd} disabled={!isDash&&idx>=keys.length-1} title="Ďalej">→</button>
      </div>
    </header>
  );
}

  return (

          : candidates.map(s=>(
            <div key={s.id} className="sel-row" onClick={()=>toggleSel(s.id)}>
              <input type="checkbox" className="sel-check" checked={selected.includes(s.id)} onChange={()=>toggleSel(s.id)} onClick={e=>e.stopPropagation()}/>
              <span className="sel-text">{s.text}</span>
              <div className="score-pips">{Array.from({length:5}).map((_,i)=>(<div key={i} className="pip-dot" style={{background:i<s.score?"var(--yellow)":"var(--bg3)"}}/>))}</div>
            </div>
          ))
        }
      </div>
      {selItems.map((s,idx)=>(
        <div key={s.id} className="top3-card">
          <div className="top3-tag">Riešenie {idx+1} z 3 — Analytická karta</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,textTransform:"uppercase",color:"var(--ink)",marginBottom:4}}>{s.text}</div>
          <div className="analytic-grid">
            {[
              {key:"plusy",label:"Plusy",ph:"Silné stránky riešenia...",multi:true},
              {key:"minusy",label:"Mínusy",ph:"Slabiny a riziká...",multi:true},
              {key:"cas",label:"Časová náročnosť",ph:"Napr. 4–6 týždňov MVP...",multi:false},
              {key:"rychlost",label:"Rýchlosť aplikácie v praxi",ph:"Napr. Nasaditeľné za 2 týždne...",multi:false},
            ].map(f=>(
              <div key={f.key}>
                <label className="analytic-label">{f.label}</label>
                {f.multi
                  ? <textarea className="textarea" style={{minHeight:80}} placeholder={f.ph} value={(cards[s.id]||{})[f.key]||""} onChange={e=>updCard(s.id,f.key,e.target.value)}/>
                  : <input className="input" placeholder={f.ph} value={(cards[s.id]||{})[f.key]||""} onChange={e=>updCard(s.id,f.key,e.target.value)}/>
                }
              </div>
            ))}
          </div>
        </div>
      ))}
      <hr className="divider"/>
      <div className="export-box">
        <div className="export-title">Export dokumentácie</div>
        <div className="export-sub">Vygeneruj finálny dokument zo všetkých vypísaných údajov — definícia, analýza, feedback, riešenia a analytické karty.</div>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn btn-yellow" onClick={()=>{setExp(true);window.print();}}>Exportovať do PDF</button>
          <button className="btn" style={{background:"rgba(255,255,255,0.12)",color:"#fff",border:"1.5px solid rgba(255,255,255,0.2)"}}>Stiahnuť ako dokument</button>
        </div>
        {exported && (<div style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:"var(--r)",padding:"12px 18px",marginTop:20,textAlign:"left"}}><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",color:"var(--green)",marginBottom:6}}>Hotovo</div><div style={{fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.7}}>Dokumentácia bola odoslaná na tlač. Gratulujeme k dokončeniu 3-týždňového sprintu Dasato programu.</div></div>)}
      </div>
    </div>
  );
}

/* ── ROOT ── */
function App() {
  const [active,setActive]   = useState("dashboard");
  const [status,setStatus]   = useState({m0:"todo",m1:"todo",m2:"todo",m3:"todo"});
  const [solutions,setSols]  = useState(initSolutions.map(s=>({...s})));
  const navigate = key => { setActive(key); window.scrollTo({top:0}); };
  const complete = (key,next) => { setStatus(p=>({...p,[key]:"done",...(next?{[next]:"active"}:{})})); if(next) navigate(next); };
  return (
    <div className="app">
      <Topbar active={active} onNav={navigate} status={status}/>
      <div className="body">
        <Sidebar active={active} onNav={navigate} status={status}/>
        <main className="main">
          {active==="dashboard" && <Dashboard onNav={navigate} status={status}/>}
          {active==="m0"        && <Module0 onComplete={()=>complete("m0","m1")}/>}
          {active==="m1"        && <Module1 onComplete={()=>complete("m1","m2")}/>}
          {active==="m2"        && <Module2 onComplete={()=>complete("m2","m3")} onSaveSols={setSols}/>}
          {active==="m3"        && <Module3 solutions={solutions}/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
